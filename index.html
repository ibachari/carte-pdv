.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 12px;width:220px;}

.client-card{padding:12px 16px;border-bottom:1px solid #f0ede8;cursor:pointer;}

.client-card.active{background:#f0ede8;}
.cname{font-size:13px;font-weight:500;margin-bottom:2px;}
.addr{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500;}
#map{flex:1;}
.status-bar{padding:8px 16px;font-size:12px;color:#888;background:#faf9f7;border-top:1px solid #f0ede8;}
.empty{padding:32px 16px;text-align:center;color:#aaa;font-size:13px;}
@media(max-width:640px){.layout{flex-direction:column;}#sidebar{width:100%;height:200px;}#map{height:400px;}}
</style>
