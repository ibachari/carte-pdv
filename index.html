.sidebar-header{padding:12px 16px;border-bottom:1px solid #f0ede8;font-size:12px;color:#888;background:#faf9f7;}
.client-card{padding:12px 16px;border-bottom:1px solid #f0ede8;cursor:pointer;transition:background .1s;}
.client-card:hover{background:#faf9f7;}
.client-card.active{background:#f0ede8;}
.client-card .cname{font-size:13px;font-weight:500;margin-bottom:2px;}
.client-card .addr{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.client-card .badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500;}
#map{flex:1;}
.status-bar{padding:8px 16px;font-size:12px;color:#888;background:#faf9f7;border-top:1px solid #f0ede8;}
.empty{padding:32px 16px;text-align:center;color:#aaa;font-size:13px;}
@media(max-width:640px){.layout{flex-direction:column;}#sidebar{width:100%;height:220px;}#map{height:400px;}}
</style>

let map,markers=[],activeZone="all";
function makeIcon(c){return L.divIcon({className:"",html:`<div style="width:12px;height:12px;border-radius:50%;background:${c};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);"></div>`,iconSize:[12,12],iconAnchor:[6,6]});}
function sc(s){return SECTEUR_COLORS[s]||"#888";}
function applyFilters(){const q=(document.getElementById("search").value||"").toLowerCase();const f=DATA.filter(c=>(activeZone==="all"||c.zone===activeZone)&&(!q||c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q)||(c.secteur||"").toLowerCase().includes(q)));document.getElementById("count-label").textContent=DATA.length+" points de vente";renderMarkers(f);renderList(f);}
function renderMarkers(cl){markers.forEach(m=>map.removeLayer(m));markers=[];cl.forEach(c=>{const m=L.marker([c.lat,c.lng],{icon:makeIcon(sc(c.secteur))}).addTo(map).bindPopup(`<strong>${c.name}</strong><br><span style="font-size:11px;color:#888;">${c.secteur}</span><br><span style="font-size:12px;color:#666;">${c.address||c.city}</span>`);m._c=c;markers.push(m);});if(cl.length>0)map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));}
function renderList(cl){document.getElementById("sidebar-count").textContent=cl.length+" résultat"+(cl.length>1?"s":"");const list=document.getElementById("client-list");if(!cl.length){list.innerHTML='<div class="empty">Aucun résultat</div>';list._c=[];return;}list.innerHTML=cl.map((c,i)=>`<div class="client-card" data-i="${i}" onclick="focusClient(${i})"><div class="cname">${c.name}</div><div class="addr">${c.street?c.street+", ":""}${c.city}</div><div class="badges"><span class="badge" style="background:${sc(c.secteur)}22;color:${sc(c.secteur)};">${c.secteur||"—"}</span><span class="badge" style="background:${ZONE_COLORS[c.zone]}22;color:${ZONE_COLORS[c.zone]};">${ZONE_LABELS[c.zone]}</span></div></div>`).join("");list._c=cl;}
function focusClient(i){const c=document.getElementById("client-list")._c[i];document.querySelectorAll(".client-card").forEach(el=>el.classList.remove("active"));document.querySelector(`.client-card[data-i="${i}"]`)?.classList.add("active");map.setView([c.lat,c.lng],15);const m=markers.find(m=>m._c===c);if(m)m.openPopup();}
window.addEventListener("load",()=>{map=L.map("map").setView([46.5,2.5],6);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"© OpenStreetMap",maxZoom:19}).addTo(map);const zones=["all",...Object.keys(ZONE_COLORS)];const zc={all:DATA.length};DATA.forEach(c=>{zc[c.zone]=(zc[c.zone]||0)+1;});document.getElementById("filter-btns").innerHTML=zones.filter(z=>z==="all"||zc[z]).map(z=>`<button class="filter-btn${z==="all"?" active":""}" onclick="activeZone='${z}';document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));this.classList.add('active');applyFilters();">${z==="all"?"Tous ("+DATA.length+")":ZONE_LABELS[z]+" ("+(zc[z]||0)+")"}</button>`).join("");applyFilters();});
</script>
