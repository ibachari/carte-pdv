<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9f7f4;color:#1a1a1a;}
header{background:#fff;border-bottom:1px solid #e8e4de;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
header h1{font-size:17px;font-weight:600;}
header p{font-size:13px;color:#888;margin-top:2px;}
.filters{display:flex;gap:6px;flex-wrap:wrap;}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #ddd;background:#fff;cursor:pointer;color:#555;white-space:nowrap;}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;}
.search-bar{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid #ddd;border-radius:8px;padding:6px 12px;width:220px;}
.search-bar input{border:none;outline:none;width:100%;font-size:13px;}
.layout{display:flex;height:calc(100vh - 65px);}
#sidebar{width:320px;flex-shrink:0;background:#fff;border-right:1px solid #e8e4de;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-header{padding:12px 16px;border-bottom:1px solid #f0ede8;font-size:12px;color:#888;background:#faf9f7;}
.client-card{padding:12px 16px;border-bottom:1px solid #f0ede8;cursor:pointer;}
.client-card:hover{background:#faf9f7;}
.client-card.active{background:#f0ede8;}
.cname{font-size:13px;font-weight:500;margin-bottom:2px;}
.addr{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500;}
#map{flex:1;}
.status-bar{padding:8px 16px;font-size:12px;color:#888;background:#faf9f7;border-top:1px solid #f0ede8;}
.empty{padding:32px 16px;text-align:center;color:#aaa;font-size:13px;}
@media(max-width:640px){.layout{flex-direction:column;}#sidebar{width:100%;height:200px;}#map{height:400px;}}
</style>
</head>

street": "2 Passage Jaqueline Giraud", "city": "Paris", "country": "France", "address": "2 Passage Emma Calve, 75012 Paris, France", "lat": 48.848194, "lng": 2.385906400000001, "zone": "paris"}, {"name": "Léonie Ternes", "secteur": "Chaine de boulangerie", "street": "18 Avenue des Ternes", "city": "Paris", "country": "France", "address": "18 Avenue des Ternes, 75017 Paris, France", "lat": 48.8785685, "lng": 2.2953419, "zone": "paris"}, {"name": "Léonie Headquarter", "secteur": "Chaine de boulangerie", "street": "96 Rue de Lévis", "city": "Paris", "country": "France", "address": "96 Rue de Lévis, 75017 Paris, France", "lat": 48.8851062, "lng": 2.3114547, "zone": "paris"}, {"name": "Monoprix Nice", "secteur": "GMS", "street": "42 Avenue Jean Médecin", "city": "Nice", "country": "France", "address": "42 Avenue Jean Médecin, Nice, France", "lat": 43.7024888, "lng": 7.267351000000001, "zone": "province"}, {"name": "La Flottille", "secteur": "Restaurant", "street": "Allée d'Apollon", "city": "Versailles", "country": "France", "address": "La Petite Venise, Allée d'Apollon, 78000 Versailles, France", "lat": 48.8087937, "lng": 2.1108969, "zone": "idf"}, {"name": "Monoprix Issy les Moulineaux", "secteur": "GMS", "street": "1 Rue Lamartine", "city": "Issy-les-Moulineaux", "country": "France", "address": "1 Rue Lamartine, 92130 Issy-les-Moulineaux, France", "lat": 48.8235259, "lng": 2.2746703, "zone": "idf"}, {"name": "Nanie", "secteur": "Coffee shop", "street": "6 Place de l'Église", "city": "Rueil-Malmaison", "country": "France", "address": "6 Place de l'Église, Rueil-Malmaison, France", "lat": 48.8767348, "lng": 2.1809846, "zone": "idf"}, {"name": "Atelier papilles", "secteur": "Chaine de boulangerie", "street": "320 Avenue Archimède", "city": "Aix-en-Provence", "country": "France", "address": "320 Av. Archimède, Aix-en-Provence, France", "lat": 43.4910211, "lng": 5.3400778, "zone": "province"}, {"name": "LAIT FROMAGERES", "secteur": "Fromagerie", "street": "", "city": "Domo var map, markers = [], activeZone = "all";

function sc(s) { return SECTEUR_COLORS[s] || "#888"; }

function makeIcon(color) {
  var div = document.createElement("div");
  div.style.cssText = "width:12px;height:12px;border-radius:50%;background:" + color + ";border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.3);";
  return L.divIcon({className:"", html:div.outerHTML, iconSize:[12,12], iconAnchor:[6,6]});
}

function applyFilters() {
  var q = (document.getElementById("search").value || "").toLowerCase();
  var f = DATA.filter(function(c) {
    var zoneOk = activeZone === "all" || c.zone === activeZone;
    var searchOk = !q || c.name.toLowerCase().indexOf(q) !== -1 || c.city.toLowerCase().indexOf(q) !== -1 || (c.secteur||"").toLowerCase().indexOf(q) !== -1;
    return zoneOk && searchOk;
  });
  document.getElementById("count-label").textContent = DATA.length + " points de vente";
  renderMarkers(f);
  renderList(f);
}

function renderMarkers(clients) {
  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];
  clients.forEach(function(c) {
    var color = sc(c.secteur) || ZONE_COLORS[c.zone] || "#888";
    var popup = "<strong>" + c.name + "</strong><br><em style='font-size:11px;color:#888;'>" + (c.secteur||"") + "</em><br><span style='font-size:12px;color:#666;'>" + (c.address||c.city) + "</span>";
    var m = L.marker([c.lat, c.lng], {icon: makeIcon(color)}).addTo(map).bindPopup(popup);
    m._c = c;
    markers.push(m);
  });
  if (clients.length > 0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
}

function renderList(clients) {
  document.getElementById("sidebar-count").textContent = clients.length + " resultat" + (clients.length > 1 ? "s" : "");
  var list = document.getElementById("client-list");
  if (!clients.length) { list.innerHTML = '<div class="empty">Aucun resultat</div>'; list._c = []; return; }
  var html = "";
  for (var i = 0; i < clients.length; i++) {
    var c = clients[i];
    var sColor = sc(c.secteur);
    var zColor = ZONE_COLORS[c.zone] || "#888";
    html += '<div class="client-card" data-i="' + i + '" onclick="focusClient(' + i + ')">';
    html += '<div class="cname">' + c.name + '</div>';
    html += '<div class="addr">' + (c.street ? c.street + ", " : "") + c.city + '</div>';
    html += '<div class="badges">';
    html += '<span class="badge" style="background:' + sColor + '22;color:' + sColor + ';">' + (c.secteur||"-") + '</span>';
    html += '<span class="badge" style="background:' + zColor + '22;color:' + zColor + ';">' + (ZONE_LABELS[c.zone]||c.zone) + '</span>';
    html += '</div></div>';
  }
  list.innerHTML = html;
  list._c = clients;
}

function focusClient(i) {
  var clients = document.getElementById("client-list")._c;
  if (!clients || !clients[i]) return;
  var c = clients[i];
  document.querySelectorAll(".client-card").forEach(function(el) { el.classList.remove("active"); });
  var card = document.querySelector(".client-card[data-i='" + i + "']");
  if (card) { card.classList.add("active"); card.scrollIntoView({block:"nearest"}); }
  map.setView([c.lat, c.lng], 15);
  for (var j = 0; j < markers.length; j++) { if (markers[j]._c === c) { markers[j].openPopup(); break; } }
}

window.addEventListener("load", function() {
  map = L.map("map").setView([46.5, 2.5], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap", maxZoom: 19
  }).addTo(map);

  var zc = {all: DATA.length};
  DATA.forEach(function(c) { zc[c.zone] = (zc[c.zone] || 0) + 1; });

  var zones = ["all", "paris", "idf", "province", "autre"];
  var btnsHtml = "";
  zones.forEach(function(z) {
    if (z !== "all" && !zc[z]) return;
    var label = z === "all" ? "Tous (" + DATA.length + ")" : (ZONE_LABELS[z]||z) + " (" + (zc[z]||0) + ")";
    var active = z === "all" ? " active" : "";
    btnsHtml += '<button class="filter-btn' + active + '" onclick="activeZone=\'' + z + '\';document.querySelectorAll(\'.filter-btn\').forEach(function(b){b.classList.remove(\'active\')});this.classList.add(\'active\');applyFilters();">' + label + '</button>';
  });
  document.getElementById("filter-btns").innerHTML = btnsHtml;
  applyFilters();
});
</script>
