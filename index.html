.sidebar-header{padding:12px 16px;border-bottom:1px solid #f0ede8;font-size:12px;color:#888;background:#faf9f7}
.client-card{padding:12px 16px;border-bottom:1px solid #f0ede8;cursor:pointer}
.client-card:hover{background:#faf9f7}
.client-card.active{background:#f0ede8}
.cname{font-size:13px;font-weight:500;margin-bottom:2px}
.addr{font-size:12px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.badge{font-size:10px;padding:1px 6px;border-radius:10px;font-weight:500}
#map{flex:1}
.status-bar{padding:8px 16px;font-size:12px;color:#888;background:#faf9f7;border-top:1px solid #f0ede8}
.empty{padding:32px 16px;text-align:center;color:#aaa;font-size:13px}
@media(max-width:640px){.layout{flex-direction:column}#sidebar{width:100%;height:200px}#map{height:400px}}

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
var ZC = {paris:"#178bff",idf:"#1d9e75",france:"#e07b00",export:"#9d50dd",autre:"#888"};
var ZL = {paris:"Paris",idf:"Ile-de-France",france:"France",export:"Export",autre:"Autre"};
var SC = {
  Epicerie:"#e63946",Fromagerie:"#784bd1",Boulangerie:"#9d50dd",
  "Chaine de boulangerie":"#7b2d8b",Restaurant:"#999",
  "Chaine de restaurant":"#ff007f","Coffee shop":"#cab641",
  Traiteur:"#ff5ac4",Grossiste:"#007eb5",GMS:"#0080ff",
  "Meal box":"#9cd326",Chocolatier:"#ffcb00",Cueillette:"#ff7575"
};
var DATA = JSON.parse(document.getElementById("map-data").textContent);
var map, markers = [], activeZone = "all";

function sc(s) { return SC[s] || "#888"; }

function makeIcon(color) {
  var d = document.createElement("div");
  d.style.width = "12px";
  d.style.height = "12px";
  d.style.borderRadius = "50%";
  d.style.background = color;
  d.style.border = "2.5px solid #fff";
  d.style.boxShadow = "0 1px 4px rgba(0,0,0,.3)";
  return L.divIcon({className:"", html:d.outerHTML, iconSize:[12,12], iconAnchor:[6,6]});
}

function applyFilters() {
  var q = (document.getElementById("search").value || "").toLowerCase();
  var f = DATA.filter(function(c) {
    var zOk = activeZone === "all" || c.zone === activeZone;
    var sOk = !q
      || c.name.toLowerCase().indexOf(q) !== -1
      || (c.city || "").toLowerCase().indexOf(q) !== -1
      || (c.secteur || "").toLowerCase().indexOf(q) !== -1;
    return zOk && sOk;
  });
  document.getElementById("count-label").textContent = DATA.length + " points de vente";
  renderMarkers(f);
  renderList(f);
}

function renderMarkers(cl) {
  markers.forEach(function(m) { map.removeLayer(m); });
  markers = [];
  cl.forEach(function(c) {
    var color = sc(c.secteur) || ZC[c.zone] || "#888";
    var popup = document.createElement("div");
    var t = document.createElement("strong");
    t.textContent = c.name;
    var s = document.createElement("small");
    s.textContent = c.secteur || "";
    var a = document.createElement("span");
    a.textContent = c.address || c.city || "";
    popup.appendChild(t);
    popup.appendChild(document.createElement("br"));
    popup.appendChild(s);
    popup.appendChild(document.createElement("br"));
    popup.appendChild(a);
    var m = L.marker([c.lat, c.lng], {icon:makeIcon(color)}).addTo(map).bindPopup(popup);
    m._c = c;
    markers.push(m);
  });
  if (cl.length > 0) map.fitBounds(L.featureGroup(markers).getBounds().pad(0.1));
}

function renderList(cl) {
  document.getElementById("sidebar-count").textContent = cl.length + " resultat" + (cl.length > 1 ? "s" : "");
  var list = document.getElementById("client-list");
  list._c = cl;
  while (list.firstChild) list.removeChild(list.firstChild);
  if (!cl.length) {
    var e = document.createElement("div");
    e.className = "empty";
    e.textContent = "Aucun resultat";
    list.appendChild(e);
    return;
  }
  var frag = document.createDocumentFragment();
  for (var i = 0; i < cl.length; i++) {
    var c = cl[i];
    var card = document.createElement("div");
    card.className = "client-card";
    card.setAttribute("data-i", i);
    var nm = document.createElement("div");
    nm.className = "cname";
    nm.textContent = c.name;
    var ad = document.createElement("div");
    ad.className = "addr";
    ad.textContent = (c.street ? c.street + ", " : "") + (c.city || "");
    var bg = document.createElement("div");
    bg.className = "badges";
    var b1 = document.createElement("span");
    b1.className = "badge";
    b1.textContent = c.secteur || "-";
    var sC = sc(c.secteur);
    b1.style.background = sC + "22";
    b1.style.color = sC;
    var b2 = document.createElement("span");
    b2.className = "badge";
    b2.textContent = ZL[c.zone] || c.zone || "";
    var zC = ZC[c.zone] || "#888";
    b2.style.background = zC + "22";
    b2.style.color = zC;
    bg.appendChild(b1);
    bg.appendChild(b2);
    card.appendChild(nm);
    card.appendChild(ad);
    card.appendChild(bg);
    card.addEventListener("click", function() {
      focusClient(parseInt(this.getAttribute("data-i")));
    });
    frag.appendChild(card);
  }
  list.appendChild(frag);
}

function focusClient(i) {
  var cl = document.getElementById("client-list")._c;
  if (!cl || !cl[i]) return;
  var c = cl[i];
  var cards = document.querySelectorAll(".client-card");
  for (var k = 0; k < cards.length; k++) { cards[k].classList.remove("active"); }
  var card = document.querySelector(".client-card[data-i='" + i + "']");
  if (card) { card.classList.add("active"); card.scrollIntoView({block:"nearest"}); }
  map.setView([c.lat, c.lng], 15);
  for (var j = 0; j < markers.length; j++) {
    if (markers[j]._c === c) { markers[j].openPopup(); break; }
  }
}

window.addEventListener("load", function() {
  map = L.map("map").setView([46.5, 2.5], 6);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution:"© OpenStreetMap", maxZoom:19
  }).addTo(map);
  document.getElementById("search").addEventListener("input", applyFilters);
  var zc = {all:DATA.length};
  DATA.forEach(function(c) { zc[c.zone] = (zc[c.zone] || 0) + 1; });
  var zones = ["all","paris","idf","france","export","autre"];
  var container = document.getElementById("filter-btns");
  zones.forEach(function(z) {
    if (z !== "all" && !zc[z]) return;
    var label = z === "all" ? "Tous (" + DATA.length + ")" : (ZL[z]||z) + " (" + (zc[z]||0) + ")";
    var btn = document.createElement("button");
    btn.className = "filter-btn" + (z === "all" ? " active" : "");
    btn.textContent = label;
    btn.setAttribute("data-zone", z);
    btn.addEventListener("click", function() {
      activeZone = this.getAttribute("data-zone");
      var btns = document.querySelectorAll(".filter-btn");
      for (var b = 0; b < btns.length; b++) { btns[b].classList.remove("active"); }
      this.classList.add("active");
      applyFilters();
    });
    container.appendChild(btn);
  });
  applyFilters();
});
</script>
